<script>


 function toggleSidebar(hideEl, showEl, shouldShow) {
     let currentStateToggled = document.querySelector("#sidebar").style.visbility  === "none"
     console.log(currentStateToggled)


     if (shouldShow) {
         showEl.style.display = 'none'
         document.querySelector("#sidebar").style.width = "260px"
         document.querySelector("#sidebar").style.visbility = "visible"
     } else {
         showEl.style.display = 'block'
         document.querySelector("#sidebar").style.width = "0px"
         document.querySelector("#sidebar").style.visbility = "none"
     }

 }

 setTimeout(function () {
     let [hide, show] = ["#hide-sidebar", "#show-sidebar"].map(q => document.querySelector(q))
     //console.log(hide, show)
     if (show) show.style.display = 'none'
     if (hide) hide.addEventListener('click', () => toggleSidebar(hide, show, false))
     if (show) show.addEventListener('click', () => toggleSidebar(hide, show, true))
 }, 0)


</script>
